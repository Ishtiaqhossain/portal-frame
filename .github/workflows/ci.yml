name: CI

# Build the debug APK and run JVM unit tests on every push and pull request,
# so a broken build or a failing test is caught before it lands. The signed
# release build lives in release.yml (tag pushes only) and needs no secrets here.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch: {}

# Cancel an in-progress run when newer commits land on the same ref (and avoid a
# duplicate run when a push and its pull_request would both fire).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK + run unit tests
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug testDebugUnitTest --no-daemon --stacktrace

      - name: Upload unit test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          if-no-files-found: ignore
